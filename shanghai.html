<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海 · 3D 旅行地图</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
  #title-card .stamp,
  .loading-stamp { background: #b8860b; }
  #title-card::after { display: none; }
  #hint .sep { color: #c8b084; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./assets/lib/three.module.js",
    "three/addons/controls/OrbitControls.js": "./assets/lib/OrbitControls.js",
    "three/addons/renderers/CSS2DRenderer.js": "./assets/lib/CSS2DRenderer.js"
  }
}
</script>
</head>
<body>

<div id="loading">
  <div class="loading-stamp">沪</div>
  <p>正在展开地图……</p>
</div>

<div id="scene-container"></div>

<header id="title-card">
  <div class="stamp">沪</div>
  <div class="title-text">
    <h1>上海 · 3D 旅行地图</h1>
    <p class="sub">SHANGHAI TRAVEL MAP <span class="dot">·</span> 浦江两岸 × 摩登都会</p>
  </div>
</header>

<aside id="spot-list">
  <h2>十二景</h2>
  <ul id="spot-list-ul"></ul>
</aside>

<footer id="hint">
  <span>🖱 拖拽平移地图</span><span class="sep">|</span>
  <span>滚轮上下拨动旋转模型（高度不变）</span><span class="sep">|</span>
  <span>点击照片查看该景区 YouTube 视频</span><span class="sep">|</span>
  <span>点空白处关闭</span>
</footer>

<div id="video-panel" class="hidden">
  <div id="video-panel-title"></div>
  <div id="video-panel-strip"></div>
</div>

<div id="tooltip" class="hidden">
  <img id="tooltip-img" alt="">
  <div class="tooltip-body">
    <div class="tooltip-head">
      <h3 id="tooltip-name"></h3>
      <span id="tooltip-tag"></span>
    </div>
    <p id="tooltip-desc"></p>
  </div>
</div>

<div id="compass" aria-hidden="true">
  <svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#8a6f4d" stroke-width="2"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#8a6f4d" stroke-width="0.8" stroke-dasharray="3 4"/>
    <polygon points="50,12 56,50 50,88 44,50" fill="#b8860b"/>
    <polygon points="50,12 56,50 44,50" fill="#d4a017"/>
    <text x="50" y="9" text-anchor="middle" font-size="11" fill="#6b5232" font-family="serif">北</text>
  </svg>
</div>

<script type="module" src="assets/js/shanghai.js"></script>
</body>
</html>
